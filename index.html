<!DOCTYPE html>
<html>
<head>
    <title>WoS Controller Bridge</title>
</head>
<body>
    <h2>Waste of Space VR Bridge</h2>
    <button id="start" style="font-size:24px;padding:20px;">▶ START VR</button>
    <pre id="log" style="background:#000;color:#0f0;padding:10px;">Ready</pre>

    <script>
        // PASTE YOUR CDLESS URL HERE:
        const CDLESS_URL = "https://cdless.com/@YOUR_USERNAME/YOUR_FUNCTION@latest";
        
        const logDiv = document.getElementById('log');
        let session = null;
        
        function log(msg) {
            logDiv.innerText = new Date().toLocaleTimeString() + ": " + msg + "\n" + logDiv.innerText;
        }
        
        async function sendPose(left, right) {
            try {
                await fetch(CDLESS_URL, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({method:'POST', body:{left:left, right:right}})
                });
            } catch(e) { log("Send error: " + e.message); }
        }
        
        document.getElementById('start').onclick = async () => {
            if (!navigator.xr) { log("WebXR not supported"); return; }
            
            session = await navigator.xr.requestSession('immersive-vr');
            log("VR Active - Tracking controllers");
            
            function updateFrame(time, frame) {
                const refSpace = session.renderState.baseLayer?.referenceSpace;
                const pose = frame.getViewerPose(refSpace);
                
                if (pose) {
                    let leftPos = null, rightPos = null;
                    for (let source of session.inputSources) {
                        const ray = frame.getPose(source.targetRaySpace, refSpace);
                        if (ray && source.handedness === 'left') {
                            leftPos = ray.transform.position;
                        }
                        if (ray && source.handedness === 'right') {
                            rightPos = ray.transform.position;
                        }
                    }
                    if (leftPos || rightPos) {
                        sendPose(leftPos, rightPos);
                        log(`L: ${leftPos?.x?.toFixed(2)||'none'} R: ${rightPos?.x?.toFixed(2)||'none'}`);
                    }
                }
                session.requestAnimationFrame(updateFrame);
            }
            session.requestAnimationFrame(updateFrame);
        };
    </script>
</body>
</html>
